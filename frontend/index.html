<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REALIST – Real Estate Lead Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fafbfc;font-family:system-ui,sans-serif;color:#0f172a">
        <div style="text-align:center;padding:2rem">
          <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#0d9488;border-radius:50%;animation:boot-spin .8s linear infinite;margin:0 auto 1rem"></div>
          <p style="margin:0;font-weight:600">Loading REALIST…</p>
        </div>
      </div>
    </div>
    <style>@keyframes boot-spin{to{transform:rotate(360deg)}}</style>
    <script>
      window.addEventListener('error', function (e) {
        var root = document.getElementById('root');
        if (!root || root.childElementCount > 1) return;
        root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:system-ui,sans-serif;text-align:center"><div><h1 style="font-size:1.25rem;margin:0 0 .5rem">Failed to load app</h1><p style="color:#64748b;margin:0 0 1rem">' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="padding:.6rem 1.2rem;background:#0f172a;color:#fff;border:0;border-radius:.5rem;cursor:pointer">Reload</button></div></div>';
      });
      setTimeout(function () {
        var fb = document.getElementById('boot-fallback');
        if (fb) {
          fb.innerHTML = '<div style="text-align:center;padding:2rem"><p style="margin:0 0 1rem;font-weight:600">Still loading…</p><button onclick="location.reload()" style="padding:.6rem 1.2rem;background:#0f172a;color:#fff;border:0;border-radius:.5rem;cursor:pointer">Reload page</button></div>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
